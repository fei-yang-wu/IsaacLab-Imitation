[workspace]
authors = ["Feiyang Wu <feiyangwu@gatech.edu>"]
channels = ["conda-forge"]
name = "IsaacLab-Imitation"
platforms = ["linux-64"]
requires-pixi = ">=0.40"
version = "0.1.0"

[tasks]
lint = "ruff check ."
format-check = "ruff format --check ."
typecheck = "pyrefly check"
check = { depends-on = ["lint", "format-check", "typecheck"] }
test-rlopt = { cmd = "pytest tests/test_ipmd_components.py tests/test_offline_dataset.py tests/test_gail_amp_ase_components.py tests/test_skill_commander.py -o 'filterwarnings=ignore:Creating VanillaWeightUpdater.*:DeprecationWarning'", cwd = "RLOpt" }
test-runtime-bootstrap = "pytest -q source/isaaclab_imitation/test_rlopt_runtime_bootstrap.py"
test-default = { depends-on = ["test-rlopt", "test-runtime-bootstrap"] }

[dependencies]
python = "3.12.*"
cmake = "*"
cxx-compiler = "*"
git = "*"
gh = "*"
filelock = "==3.25.2"
make = "*"
ninja = "*"
packaging = "==26.0"
pre-commit = "*"
pytest = "*"
pyyaml = "==6.0.3"
ruff = "*"
setuptools = "<82"
toml = "*"
typing-extensions = "==4.12.2"
wheel = "*"

[pypi-dependencies]
# NOTE: Isaac Lab 3.0 officially documents cu128 for linux x86_64; cu130 is an
# ad hoc override for cluster hardware whose driver stack only ships CUDA 13.
torch = { version = "==2.11.0", index = "https://download.pytorch.org/whl/cu130" }
torchvision = { version = "==0.26.0", index = "https://download.pytorch.org/whl/cu130" }
tensordict = "==0.11.0"
torchrl = "==0.11.1"
wandb = "==0.25.0"
pyrefly = "*"
huggingface-hub = "*"
rlopt = { path = "./RLOpt", editable = true }
iltools = { path = "./ImitationLearningTools", editable = true }
sentence-transformers = ">=5.5.1, <6"

[feature.isaaclab.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]
index-strategy = "unsafe-best-match"

[feature.isaaclab.system-requirements]
libc = { family = "glibc", version = "2.35" }

[feature.isaaclab.dependencies]
libxml2 = "<2.14"

[feature.isaaclab.pypi-dependencies]
isaaclab = { version = "==3.0.0b2.post1", extras = [
    "isaacsim",
    "all",
], index = "https://pypi.nvidia.com" }
# transitive pre-release pin of isaacsim-core 6.0.1.0; uv only accepts pre-releases requested explicitly
tinyobjloader = "==2.0.0rc13"
isaaclab_imitation = { path = "./source/isaaclab_imitation", editable = true }

[feature.isaaclab.tasks]
test-isaaclab = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES pytest source/isaaclab_imitation/test_causal_planner_observation.py source/isaaclab_imitation/test_policy_supervision_contract.py"
zero-agent = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES python scripts/zero_agent.py --task Isaac-Imitation-G1-LafanTrack-v0"
smoke-ipmd = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train_physx.py --task Isaac-Imitation-G1-Latent-v0 --algo IPMD --num_envs 16 --max_iterations 1 --headless --kit_args=--/app/extensions/fsWatcherEnabled=false env.lafan1_manifest_path=./data/unitree/manifests/g1_unitree_dance102_manifest.json agent.logger.backend= agent.ipmd.command_source=posterior"
smoke-future-cvae = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train_physx.py --task Isaac-Imitation-G1-Latent-FutureCVAE-v0 --algo IPMD --num_envs 4 --max_iterations 1 --headless --kit_args=--/app/extensions/fsWatcherEnabled=false env.lafan1_manifest_path=./data/unitree/manifests/g1_unitree_dance102_manifest.json agent.logger.backend= agent.ipmd.command_source=posterior"
smoke-per-step-vq = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train_physx.py --task Isaac-Imitation-G1-Latent-PerStepVQ-v0 --algo IPMD --num_envs 4 --max_iterations 1 --headless --kit_args=--/app/extensions/fsWatcherEnabled=false env.lafan1_manifest_path=./data/unitree/manifests/g1_unitree_dance102_manifest.json agent.logger.backend= agent.ipmd.command_source=posterior"
smoke-causal-planner = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 python experiments/interface_baselines/smoke_test_causal_planner_env.py --headless --kit_args=--/app/extensions/fsWatcherEnabled=false --task Isaac-Imitation-G1-Latent-v0 --num_envs 4 --motion_manifest=./data/unitree/manifests/g1_unitree_dance102_manifest.json"
hl-skill-pipeline = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train_hl_skill_pipeline.py"
# Routine physics-backend checks: 1-iteration vanilla PPO smokes per backend, plus
# the throughput benchmark driver (quick = a few iterations; full ~10M frames/backend).
smoke-vanilla-physx = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train_physx.py --task Isaac-Imitation-G1-v0 --algo PPO --num_envs 16 --max_iterations 1 --headless --kit_args=--/app/extensions/fsWatcherEnabled=false env.lafan1_manifest_path=./data/unitree/manifests/g1_unitree_dance102_manifest.json agent.logger.backend= physics=physx"
smoke-vanilla-newton = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/rlopt/train.py --task Isaac-Imitation-G1-v0 --algo PPO --num_envs 16 --max_iterations 1 --headless --assert-kitless --kit_args=--/app/extensions/fsWatcherEnabled=false env.lafan1_manifest_path=./data/unitree/manifests/g1_unitree_dance102_manifest.json agent.logger.backend= physics=newton_mjwarp"
bench-backends-quick = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/benchmark_physics_backends.py --num_envs 1024 --iterations 5"
bench-backends = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 HYDRA_FULL_ERROR=1 TORCHDYNAMO_DISABLE=1 python scripts/benchmark_physics_backends.py"
bench-renderers = "env TERM=xterm OMNI_KIT_ACCEPT_EULA=YES PYTHONUNBUFFERED=1 python scripts/benchmark_renderers.py"

[feature.lerobot.pypi-dependencies]
datasets = "*"

[feature.static.dependencies]
python = "3.12.*"
ruff = "==0.12.12"

[feature.static.tasks]
lint-owned = "ruff check source/isaaclab_imitation docker --exclude source/isaaclab_imitation/test_reference_patch_env.py --ignore F403"
compile-owned = "python -m compileall -q docker source/isaaclab_imitation/isaaclab_imitation"
ci-static = { depends-on = ["lint-owned", "compile-owned"] }

[environments]
isaaclab = ["isaaclab"]
lerobot = ["lerobot"]
isaaclab-lerobot = ["isaaclab", "lerobot"]
static = { features = ["static"], no-default-feature = true }
