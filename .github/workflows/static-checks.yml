name: Static Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  python-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh

      - name: Lint owned Python surfaces
        run: |
          "$HOME/.pixi/bin/pixi" run -e static lint-owned

      - name: Byte-compile owned Python surfaces
        run: |
          "$HOME/.pixi/bin/pixi" run -e static compile-owned
